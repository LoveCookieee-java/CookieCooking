Setting:
  General:
    # Search radius for display entities
    SearchRadius: 0.45
  ChoppingBoard:
    # Drop the finished item after chopping board processing
    Drop: true
    # Require sneaking to interact with the chopping board
    # Enabled: players must sneak to use chopping board features
    # Disabled: players can interact directly without sneaking
    StealthInteraction: true
    # Use a custom block as the chopping board
    # Enabled: use blocks from compatible plugins (for example: CraftEngine)
    # Disabled: use vanilla blocks
    #
    # CraftEngine block: craftengine <Key>:<ID>
    Custom: false
    Material: OAK_LOG
    # Allow blocks above the chopping board
    # Enabled: the chopping board cannot be used when a block is above it
    # Disabled: blocks above the chopping board are allowed
    SpaceRestriction: false
    # Minimum chopping board interaction interval (seconds)
    # Prevents players from interacting too quickly
    # Set to 0 for no delay
    Delay: 1.0
    KitchenKnife:
      # Use a custom knife
      # Enabled: use items from compatible plugins (for example: CraftEngine, MMOItems)
      # Disabled: use vanilla items
      #
      # CraftEngine item: craftengine <Key>:<ID>
      # MMOItems item: mmoitems <Type>:<ID>
      Custom: false
      Material:
      - minecraft IRON_AXE
    Damage:
      # Enable the chopping board event
      # Enabled: cutting ingredients has a chance to hurt the player's finger
      Enable: true
      Chance: 10
      Value: 2
    DisplayEntity:
      Item:
        Offset:
          X: 0.5
          Y: 1.02
          Z: 0.5
        Rotation:
          X: 90.0
          Y: 0.0
          # Allows decimal Z-axis rotation angles (0.0, 360.0)
          # Also allows a random range value (0.0-360.0)
          Z: 0.0
        Scale: 0.5
      Block:
        Offset:
          X: 0.5
          Y: 1.125
          Z: 0.5
        Rotation:
          X: 0.0
          Y: 90.0
          # Allows decimal Z-axis rotation angles (0.0, 360.0)
          # Also allows a random range value (0.0-360.0)
          Z: 0.0
        Scale: 0.25
  Wok:
    # Drop the finished item after wok cooking
    Drop: true
    # Require sneaking for wok interactions
    #
    # Enabled: all wok interactions (adding ingredients, removing ingredients, and stir-frying) require sneaking
    # If Setting.Wok.NeedBowl is disabled, serving the finished dish with an empty hand does not require sneaking
    #
    # Disabled: all wok interactions (adding ingredients, removing ingredients, and stir-frying) do not require sneaking
    # If Setting.Wok.NeedBowl is disabled, serving the finished dish with an empty hand requires sneaking
    StealthInteraction: true
    # Use a custom wok block
    # Enabled: use blocks from compatible plugins (for example: CraftEngine)
    # Disabled: use vanilla blocks
    #
    # CraftEngine block: craftengine <Key>:<ID>
    Custom: false
    Material: IRON_BLOCK
    # Define the cooking strength for each heat source
    # Higher values mean stronger heat
    #
    # Supports CraftEngine blocks and furniture
    # CraftEngine block: craftengine <Key>:<ID>: <HeatLevel>
    HeatControl:
      LAVA: 3
      CAMPFIRE: 1
      MAGMA_BLOCK: 2
    # Require a bowl to serve finished wok dishes
    # Enabled: players must hold a bowl to serve the finished dish
    # Disabled: players can serve the finished dish with an empty hand
    # If enabled, sneaking for serving is controlled by Setting.Wok.StealthInteraction
    NeedBowl: true
    # This option is used when a player adds an incomplete or invalid ingredient combination
    # Serving the result will give this item as the failed output
    InvalidRecipeOutput: STONE
    # Wok stir-fry delay time (seconds)
    # This value should be less than Setting.Wok.TimeOut
    Delay: 5
    Damage:
      # Enable burn damage when taking ingredients out of the wok
      # Enabled: if ingredients are in the wok and have been stir-fried, taking them out will deal damage
      # Disabled: taking ingredients out of the wok will not deal any damage
      Enable: true
      Value: 2
    Failure:
      # Enable the wok cooking failure event
      # Enabled: cooking can still fail randomly even when ingredients and steps are correct
      # Disabled: cooking always succeeds when ingredients and steps are correct
      Enable: true
      Chance: 5
      # Output item generated when wok cooking fails
      Type: BONE_MEAL
    # Maximum wait time after a single stir-fry action (seconds)
    # This timer resets after each stir-fry action
    # If the timer ends before another stir-fry, ingredients in the wok burn into failed output
    TimeOut: 30
    Spatula:
      # Use a custom spatula
      # Enabled: use items from compatible plugins (for example: CraftEngine, MMOItems)
      # Disabled: use vanilla items
      # CraftEngine item: craftengine <Key>:<ID>
      # MMOItems item: mmoitems <Type>:<ID>
      Custom: false
      Material:
      - minecraft IRON_SHOVEL
    DisplayEntity:
      Item:
        Offset:
          X: 0.5
          Y: 1.02
          Z: 0.5
        Rotation:
          X: 90.0
          Y: 0.0
          # Allows decimal Z-axis rotation angles (0.0, 360.0)
          # Also allows a random range value (0.0-360.0)
          Z: 0.0-90.0
        Scale: 0.5
      Block:
        Offset:
          X: 0.5
          Y: 1.125
          Z: 0.5
        Rotation:
          X: 0.0
          Y: 90.0
          # Allows decimal Z-axis rotation angles (0.0, 360.0)
          # Also allows a random range value (0.0-360.0)
          #
          # Currently not recommended
          Z: 0.0
        Scale: 0.25
  Grinder:
    # Drop the finished item after grinder processing
    Drop: true
    # Require sneaking to interact with the grinder
    StealthInteraction: true
    # Use a custom grinder block
    # Enabled: use blocks from compatible plugins (for example: CraftEngine)
    # Disabled: use vanilla blocks
    #
    # CraftEngine block: craftengine <Key>:<ID>
    Custom: false
    Material: GRINDSTONE
    # Grinder completion check delay (ticks)
    # This also controls the interval for particles and sounds during grinding
    CheckDelay: 20
  Steamer:
    # CraftEngine block: craftengine <Key>:<ID>
    Material: BARREL
    # Require sneaking to interact with the steamer
    # Enabled: players must sneak to use chopping board features
    # Disabled: players can interact directly without sneaking
    StealthInteraction: true
    OpenInventory:
      # Opened container type
      # See details: https://jd.papermc.io/paper/1.21.11/org/bukkit/event/inventory/InventoryType.html
      Type: HOPPER
      Title: <dark_gray>Steamer
      # Only effective when Setting.Steamer.OpenInventory.Type is CHEST
      Slot: 9
    # Blocks that can provide heat to the steamer
    #
    # CraftEngine block: craftengine <Key>:<ID>
    HeatControl:
    - FURNACE
    - SMOKER
    # If the heat source block can be lit, ignite it after adding fuel
    Ignite: true
    # Allowed fuel items for the steamer, in seconds
    # CraftEngine item: craftengine <Key>:<ID>
    # MMOItems item: mmoitems <Type>:<ID>
    Fuel:
      STICK: 5
      COAL: 80
      CHARCOAL: 80
    # Items that can provide moisture to the steamer
    # Input item & output item & provided moisture value
    # If no output item is wanted, set the output item to AIR
    #
    # CraftEngine item: craftengine <Key>:<ID>
    # MMOItems item: mmoitems <Type>:<ID>
    Moisture:
    - minecraft WATER_BUCKET & minecraft BUCKET & 120
    - minecraft POTION & minecraft GLASS_BOTTLE & 40
    # If set to True, when steamer steam is 0, all cooking progress inside the steamer resets to 0
    # If set to False, the current cooking progress is preserved
    ResetToZero: true
    # Steam production efficiency. This controls how item moisture converts 1 moisture into 10 steam per second
    # That is 10 steam/s
    SteamProductionEfficiency: 10
    # Steam conversion efficiency. This controls how fast ingredients consume steam
    # That is 1 steam/s
    SteamConversionEfficiency: 1
    # Steam consumption efficiency. This controls the steamer's default steam drain rate, even when no ingredients are cooking
    # That is 1 steam/s
    SteamConsumptionEfficiency: 1
  Sound:
    # Sound played when adding ingredients to the chopping board
    ChoppingBoardAddItem: entity.item_frame.add_item
    # Sound played when cutting ingredients on the chopping board
    ChoppingBoardCutItem: item.axe.strip
    # Sound played when a hand is cut while using the chopping board
    ChoppingBoardCutHand: entity.player.hurt
    # Sound played when adding ingredients to the wok
    WokAddItem: block.anvil.hit
    # Sound played when stir-frying ingredients in the wok
    WokStirItem: block.lava.extinguish
    # Sound played when a hand is burned while stir-frying in the wok
    WokScald: entity.player.hurt_on_fire
    # Sound played when taking ingredients out of the wok
    WokTakeOffItem: entity.item.pickup
    # Sound played when the grinder starts grinding
    GrinderStart: block.grindstone.use
  Particle:
    ChoppingBoardCutItem:
      # Particles shown when cutting ingredients on the chopping board
      Type: CLOUD
      Amount: 10
      OffsetX: 0.5
      OffsetY: 1.0
      OffsetZ: 0.5
      Speed: 0.05
    WokStirItem:
      # Particles shown when stir-frying ingredients in the wok
      Type: CAMPFIRE_COSY_SMOKE
      Amount: 10
      OffsetX: 0.5
      OffsetY: 1.0
      OffsetZ: 0.5
      Speed: 0.05
    GrinderStart:
      # Particles shown when the grinder starts grinding
      Type: GLOW
      Amount: 10
      OffsetX: 0.5
      OffsetY: 1.0
      OffsetZ: 0.5
      Speed: 0.05
Messages:
  WokContent: ' <gray>{ItemName} <dark_gray>x <yellow>{ItemAmount} <gray>Stir count:
    <yellow>{Count}'
  Title:
    Grinder:
      SubTitle: <gray>Please wait <green>{Time} <gray>seconds for grinding
      MainTitle: <green>Grinding started!
    Scald:
      SubTitle: <gray>Careful with the hot wok! You took <red>{Damage} <gray>damage
      MainTitle: '<red>Too hot! You got burned! '
    CutHand:
      MainTitle: '<red>Ouch! You cut your hand! '
      SubTitle: <gray>Careful with the knife! You took <red>{Damage} <gray>damage
  WokTop: '<gold>Ingredients in the wok:'
  ActionBar:
    RawFood: '<red>Oops! The dish is not fully cooked yet! '
    AddFuel: '<green>Added fuel: <white>{Item} <dark_gray>| <green>Remaining burn
