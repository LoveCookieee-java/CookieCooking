    RecipeNotFound: '{Prefix} <red>Recipe not found: {ItemMaterial}'
    RewardFormatError: '{Prefix} <red>Reward format error. It must contain 4 parts:
      {Reward}'
    AmountFormatError: '{Prefix} <red>Amount format error, using default value 1:
      {Amount}'
    RewardProcessFailed: '{Prefix} <red>Failed to process reward: {ResultMaterial}'
    AmountRangeFormatErrorMin: '{Prefix} <red>Amount range format error, using minimum
